<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Agente TikTok Shop</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        h1 {
            color: #22c55e;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #1e293b;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            margin-top: 20px;
            padding: 15px 25px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>Agente TikTok Shop</h1>

    <p>Cole aqui a descrição do produto:</p>

    <textarea placeholder="Descreva o produto..."></textarea>

    <button>Gerar Roteiro</button>

</body>

</html>
